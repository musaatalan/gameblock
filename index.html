<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Blok Patlat - Ücretsiz Blok Puzzle Oyunu | Türkçe</title>
  <meta name="description" content="Blok Patlat: Ücretsiz blok puzzle oyunu. Renkli blokları tahtaya yerleştir, satırları doldur ve patlat. Türkçe, tek tıkla oyna.">
  <meta name="keywords" content="blok patlat, blok puzzle, puzzle oyunu, ücretsiz oyun, Türkçe oyun, block blast, blok oyunu">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Hoş geldin / Onay ekranı -->
  <div id="welcome-screen" class="screen active">
    <div class="welcome-content">
      <h1 class="game-title">
        <span class="title-block">BLOK</span>
        <span class="title-emoji">😘</span>
        <span class="title-blast">PATLAT!</span>
      </h1>
      <div class="consent-panel">
        <p class="welcome-text">
          Blok Patlat'a hoş geldin! Lütfen <a href="#" id="terms-link">Kullanım Koşulları</a> ve
          <a href="#" id="privacy-link">Gizlilik Politikası</a>'nı okuyup kabul et.
        </p>
        <button id="accept-btn" class="btn-accept">Kabul Et</button>
      </div>
    </div>
  </div>

  <!-- Oyun ekranı -->
  <div id="game-screen" class="screen">
    <header class="game-header">
      <div class="crown-score">
        <span class="icon-crown">👑</span>
        <span id="level-display">0</span>
      </div>
      <div class="score-block">
        <div id="score-display" class="main-score">0</div>
        <div class="high-score-line">En yüksek: <span id="high-score-display">0</span></div>
      </div>
      <button id="settings-btn" class="btn-settings" aria-label="Ayarlar">⚙️</button>
    </header>

    <main class="game-main">
      <div id="grid-container">
        <canvas id="game-grid" width="9" height="9"></canvas>
      </div>
      <div id="pieces-area">
        <p class="pieces-label">Blokları seç ve tahtaya yerleştir</p>
        <div id="pieces-slot"></div>
      </div>
    </main>
  </div>

  <!-- Oyun bitti ekranı -->
  <div id="gameover-overlay" class="overlay hidden">
    <div class="gameover-panel">
      <div class="gameover-title">Oyun Bitti</div>
      <div id="gameover-new-record" class="gameover-new-record hidden">🏆 Yeni rekor!</div>
      <div id="gameover-message" class="gameover-message">Bir daha dene!</div>
      <div class="gameover-stats">
        <div class="stat">
          <div class="stat-label">Skor</div>
          <div id="gameover-score" class="stat-value">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Seviye</div>
          <div id="gameover-level" class="stat-value">0</div>
        </div>
      </div>
      <button id="gameover-restart" class="btn-green gameover-restart">
        <span class="btn-icon">🔄</span>
        Tekrar Başla
      </button>
    </div>
  </div>

  <!-- Ayarlar penceresi -->
  <div id="settings-overlay" class="overlay hidden">
    <div class="settings-panel">
      <div class="settings-header">
        <h2>Ayarlar</h2>
        <button id="close-settings" class="btn-close" aria-label="Kapat">✕</button>
      </div>
      <div class="settings-toggles">
        <label class="toggle-row">
          <span class="toggle-icon">🔊</span>
          <span>Ses</span>
          <input type="checkbox" id="sound-toggle" checked>
          <span class="toggle-slider"></span>
        </label>
        <label class="toggle-row">
          <span class="toggle-icon">🎵</span>
          <span>Müzik (BGM)</span>
          <input type="checkbox" id="bgm-toggle">
          <span class="toggle-slider"></span>
        </label>
        <label class="toggle-row">
          <span class="toggle-icon">👕</span>
          <span>Tema</span>
          <input type="checkbox" id="skin-toggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="settings-buttons">
        <button class="btn-green" id="more-games-btn">
          <span class="btn-icon">🎮</span>
          Daha Fazla Oyun
        </button>
        <button class="btn-green" id="more-settings-btn">
          <span class="btn-icon">⚙️</span>
          Daha Fazla Ayarlar
        </button>
        <button class="btn-green" id="replay-btn">
          <span class="btn-icon">🔄</span>
          Tekrar Oyna
        </button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
